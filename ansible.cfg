[defaults]
inventory = ansible/inventory/hosts.yml
roles_path = ansible/roles
collections_path = ~/.ansible/collections:/usr/share/ansible/collections
stdout_callback = default
callback_result_format = yaml
callbacks_enabled = profile_tasks
# Opt out of the deprecated auto-injection of discovered facts as top-level
# variables. With this disabled, facts are no longer injected as top-level
# variables (neither the bare `env` alias nor the prefixed `ansible_env`); they
# must be read from the `ansible_facts` dict instead. The playbooks/roles have
# been migrated to reference `ansible_facts['env']`,
# `ansible_facts['user_uid']`, etc., so disabling this is safe and
# silences the INJECT_FACTS_AS_VARS deprecation warning (to be removed in
# ansible-core 2.24).
inject_facts_as_vars = False
# Silence the Python interpreter discovery warning. Keep auto-discovery (so the
# right interpreter is still picked automatically) but suppress the advisory,
# instead of hardcoding a user/version-specific path in this committed config.
interpreter_python = auto_silent

[privilege_escalation]
become = false
