# nginx reverse proxy for vote-backend (copied into place by the deploy-local
# role). Terminates TLS for vote-backend.local and proxies plain HTTP to the
# backend container by its name on the vote.network.
# Add "vote-backend.local <host-ip>" to /etc/hosts so the name resolves.

server {
    listen 443 ssl;
    server_name vote-backend.local;

    ssl_certificate     /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;

    # Proxy to the backend container by its name on the vote.network.
    location / {
        proxy_pass http://vote-backend:8848;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
