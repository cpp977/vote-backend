---
# roles/deploy-local/tasks/main.yml
# Local deployment role for vote-backend.
# Builds the container image, installs quadlets, and starts
# rootless Podman systemd services for the app and database.

- name: Ensure vote-backend config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/vote-backend"
    state: directory
    mode: "0755"

- name: Copy config.json to user config directory
  ansible.builtin.copy:
    src: "{{ vote_backend_project_root }}/config.json"
    dest: "{{ ansible_env.HOME }}/.config/vote-backend/config.json"
    mode: "0644"
    force: true

- name: Copy SQL init scripts to a portable location
  ansible.builtin.copy:
    src: "{{ vote_backend_project_root }}/sql/"
    dest: "{{ ansible_env.HOME }}/.local/share/vote-backend/sql/"
    mode: "0644"
    directory_mode: "0755"

- name: Build vote-backend container image
  containers.podman.podman_image:
    name: "{{ vote_backend_image_name }}"
    tag: "{{ vote_backend_image_tag }}"
    state: build
    path: "{{ vote_backend_project_root }}"
    build:
      file: "{{ vote_backend_project_root }}/Containerfile"
      force_rm: true
  register: image_build

- name: Install vote.network quadlet
  containers.podman.podman_quadlet:
    state: present
    src: "{{ vote_backend_quadlet_dir }}/vote.network"

- name: Ensure PostgreSQL data directory exists (persistent deployment)
  ansible.builtin.file:
    path: "{{ vote_backend_postgres_data_dir }}"
    state: directory
    mode: "0755"
  when: vote_backend_postgres_persistent | default(false)

- name: Render drogon-postgres quadlet (ephemeral or persistent)
  ansible.builtin.template:
    src: drogon-postgres.container.j2
    dest: "{{ ansible_env.XDG_CONFIG_HOME | default(ansible_env.HOME ~ '/.config') }}/containers/systemd/drogon-postgres.container"
    mode: "0644"

- name: Install vote-backend@.container quadlet template
  containers.podman.podman_quadlet:
    state: present
    src: "{{ vote_backend_quadlet_dir }}/vote-backend@.container"

- name: Ensure containers.conf disables netavark firewall (nftables incompatibility)
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/.config/containers/containers.conf"
    content: |
      [network]
      firewall_driver = "none"
    mode: "0644"

# --- Persistent deployment: TLS + nginx reverse proxy (HTTPS) ----------------
- name: Ensure TLS directory exists (persistent deployment)
  ansible.builtin.file:
    path: "{{ vote_backend_tls_dir }}"
    state: directory
    mode: "0700"
  when: vote_backend_postgres_persistent | default(false)

- name: Generate TLS private key (self-signed, persistent deployment)
  ansible.builtin.command:
    cmd: "openssl genrsa -out {{ vote_backend_tls_dir }}/privkey.pem 2048"
    creates: "{{ vote_backend_tls_dir }}/privkey.pem"
  when: vote_backend_postgres_persistent | default(false)

- name: Generate self-signed TLS certificate (persistent deployment)
  ansible.builtin.command:
    cmd: >-
      openssl req -new -x509 -days 365
      -key {{ vote_backend_tls_dir }}/privkey.pem
      -out {{ vote_backend_tls_dir }}/fullchain.pem
      -subj "/CN=vote-backend.local"
      -addext "subjectAltName=DNS:vote-backend.local,IP:127.0.0.1"
    creates: "{{ vote_backend_tls_dir }}/fullchain.pem"
  when: vote_backend_postgres_persistent | default(false)

- name: Restrict TLS private key permissions (persistent deployment)
  ansible.builtin.file:
    path: "{{ vote_backend_tls_dir }}/privkey.pem"
    mode: "0600"
  when: vote_backend_postgres_persistent | default(false)

- name: Copy nginx reverse-proxy configuration (persistent deployment)
  ansible.builtin.copy:
    src: nginx.conf
    dest: "{{ vote_backend_nginx_conf }}"
    mode: "0644"
  when: vote_backend_postgres_persistent | default(false)

- name: Install vote-backend-nginx quadlet (persistent deployment)
  containers.podman.podman_quadlet:
    state: present
    src: "{{ vote_backend_quadlet_dir }}/vote-backend-nginx@.container"
  when: vote_backend_postgres_persistent | default(false)

- name: Reload systemd user daemon to pick up new quadlets
  ansible.builtin.systemd_service:
    daemon_reload: true
    scope: user
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ vote_backend_uid }}"

- name: Start drogon-postgres service
  ansible.builtin.systemd_service:
    name: drogon-postgres.service
    state: started
    enabled: true
    scope: user
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ vote_backend_uid }}"

- name: Start vote-backend service (template instance)
  ansible.builtin.systemd_service:
    name: "vote-backend@{{ vote_backend_image_tag }}.service"
    state: started
    enabled: true
    scope: user
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ vote_backend_uid }}"

- name: Start vote-backend-nginx reverse proxy (persistent deployment)
  ansible.builtin.systemd_service:
    name: "vote-backend-nginx@{{ vote_backend_image_tag }}.service"
    state: started
    enabled: true
    scope: user
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ vote_backend_uid }}"
  when: vote_backend_postgres_persistent | default(false)

# If a previous persistent deployment left an nginx reverse proxy running,
# tear it down when deploying the ephemeral (test) setup.
- name: Stop and disable vote-backend-nginx reverse proxy (ephemeral deployment)
  ansible.builtin.systemd_service:
    name: "vote-backend-nginx@{{ vote_backend_image_tag }}.service"
    state: stopped
    enabled: false
    scope: user
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ vote_backend_uid }}"
  failed_when: false
  when: "not (vote_backend_postgres_persistent | default(false))"

- name: Remove vote-backend-nginx quadlet (ephemeral deployment)
  ansible.builtin.file:
    path: "{{ ansible_env.XDG_CONFIG_HOME | default(ansible_env.HOME ~ '/.config') }}/containers/systemd/vote-backend-nginx@.container"
    state: absent
  when: "not (vote_backend_postgres_persistent | default(false))"
